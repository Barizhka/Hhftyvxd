<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BE PHOENIX LSPD | Digital Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #00d2ff; --dark-blue: #3a7bd5; --bg: #050b18; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #e0e0e0; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        #app { width: 100%; max-width: 550px; background: radial-gradient(circle at top, #112244, #050b18); display: flex; flex-direction: column; border-left: 1px solid rgba(0, 210, 255, 0.3); border-right: 1px solid rgba(0, 210, 255, 0.3); box-shadow: 0 0 50px rgba(0,0,0,1); }
        
        header { padding: 20px; border-bottom: 1px solid var(--glass); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); }
        .logo { font-weight: 900; letter-spacing: 2px; color: var(--blue); text-shadow: 0 0 10px var(--blue); font-size: 1.2rem; }
        .badge { background: #00d2ff22; color: var(--blue); padding: 4px 10px; border-radius: 4px; font-size: 10px; border: 1px solid var(--blue); }

        #chat { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        #chat::-webkit-scrollbar { display: none; }

        .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.6; position: relative; backdrop-filter: blur(5px); transition: 0.3s; }
        .user { align-self: flex-end; background: linear-gradient(135deg, #3a7bd5, #00d2ff); color: white; border-bottom-right-radius: 2px; box-shadow: 0 4px 15px rgba(0, 210, 255, 0.2); }
        .bot { align-self: flex-start; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 2px; }

        /* Preparing message indicator */
        #typing { display: none; padding: 10px 20px; font-size: 12px; color: var(--blue); font-style: italic; align-self: flex-start; }
        .dots { display: inline-block; width: 40px; }
        .dots::after { content: '...'; animation: dots 1.5s infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60%, 100% { content: '...'; } }

        .input-area { padding: 20px; background: rgba(0,0,0,0.4); border-top: 1px solid var(--glass); }
        .quick-box { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 5px; }
        .tag { padding: 6px 12px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; font-size: 11px; white-space: nowrap; cursor: pointer; }
        .tag:hover { border-color: var(--blue); color: var(--blue); }

        .input-group { display: flex; background: #000; border-radius: 12px; border: 1px solid var(--glass); padding: 5px; align-items: center; }
        input { flex: 1; background: none; border: none; color: white; padding: 12px; outline: none; font-size: 14px; }
        .btn { border: none; background: none; color: #666; cursor: pointer; font-size: 18px; padding: 10px; transition: 0.3s; }
        .btn:hover { color: var(--blue); }
        .btn-send { color: var(--blue); }
        .mic-active { color: #ff4b2b !important; text-shadow: 0 0 10px #ff4b2b; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="logo">PHOENIX LSPD</div>
        <div class="badge">CPD UNIT</div>
    </header>

    <div id="chat">
        <div class="msg bot">Офицер, база данных синхронизирована. Жду ваших указаний.</div>
    </div>

    <div id="typing">Обработка данных подразделением ИИ<span class="dots"></span></div>

    <div class="input-area">
        <div class="quick-box">
            <div class="tag" onclick="fast('Миранда')">⚖️ Миранда</div>
            <div class="tag" onclick="fast('Статья 13.1 УК')">💊 Наркотики</div>
            <div class="tag" onclick="fast('Статья 17.6 УК')">🛑 Неподчинение</div>
            <div class="tag" onclick="fast('Порядок задержания')">🚔 Процесс</div>
        </div>
        <div class="input-group">
            <button class="btn" id="mic"><i class="fas fa-microphone"></i></button>
            <input type="text" id="userInput" placeholder="Запрос в базу..." autocomplete="off">
            <button class="btn btn-send" onclick="send()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyBSeOzHcdG9WKNxOqCK5wcShECKlli1Aec';
    const MODEL = "gemini-1.5-flash"; // Имя модели без префиксов для v1
    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');
    const typing = document.getElementById('typing');

    async function send() {
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, 'user');
        input.value = '';
        typing.style.display = 'block';
        chat.scrollTop = chat.scrollHeight;

        try {
            // Переход на стабильную версию V1
            const url = `https://generativelanguage.googleapis.com/v1/models/${MODEL}:generateContent?key=${API_KEY}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Ты - ассистент офицера LSPD на сервере Majestic Phoenix. Отвечай кратко, используй УК и ПК. Текущий запрос: ${text}` }] }]
                })
            });

            const data = await response.json();
            typing.style.display = 'none';

            if (data.candidates && data.candidates[0].content) {
                let reply = data.candidates[0].content.parts[0].text;
                addMsg(reply, 'bot');
            } else {
                console.error("API Error:", data);
                addMsg("Ошибка доступа. Проверьте статус API в консоли (F12).", 'bot');
            }
        } catch (err) {
            typing.style.display = 'none';
            addMsg("Сбой связи. Проверьте интернет или API ключ.", 'bot');
        }
    }
