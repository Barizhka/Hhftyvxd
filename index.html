<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOENIX LSPD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --blue: #58a6ff; --text: #c9d1d9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 15px; background: var(--panel); border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .title { color: var(--blue); font-weight: bold; letter-spacing: 1px; font-size: 14px; }

        #chat { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 12px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .user { align-self: flex-end; background: #238636; color: white; }
        .bot { align-self: flex-start; background: #21262d; border: 1px solid #30363d; }

        /* Окно логов для телефона */
        #debugLog { font-size: 10px; color: #f85149; padding: 5px 15px; background: #000; display: none; border-top: 1px solid #f85149; max-height: 50px; overflow: auto; }

        #typing { display: none; padding: 10px 15px; font-size: 12px; color: #8b949e; }
        .dots::after { content: ''; animation: d 1.5s infinite; }
        @keyframes d { 0% {content: '.';} 33% {content: '..';} 66% {content: '...';} }

        .footer { padding: 10px; background: var(--panel); border-top: 1px solid #30363d; }
        .input-group { display: flex; gap: 8px; align-items: center; background: #0d1117; border-radius: 20px; padding: 5px 15px; border: 1px solid #30363d; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 8px; outline: none; font-size: 16px; } /* 16px предотвращает зум на iPhone */
        
        .btn { background: none; border: none; color: var(--blue); font-size: 18px; cursor: pointer; padding: 5px; }
        .mic-active { color: #f85149; }
        
        .tags { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 5px; scrollbar-width: none; }
        .tag { background: #21262d; padding: 5px 12px; border-radius: 15px; font-size: 11px; white-space: nowrap; border: 1px solid #30363d; }
    </style>
</head>
<body>

<header>
    <div class="title"><i class="fas fa-shield-alt"></i> PHOENIX LSPD v3.5</div>
    <div style="font-size: 10px; color: #3fb950;">● ONLINE</div>
</header>

<div id="chat">
    <div class="msg bot">Офицер, я на связи. Напишите или продиктуйте запрос.</div>
</div>

<div id="typing">Синхронизация с ИИ<span class="dots"></span></div>
<div id="debugLog"></div>

<div class="footer">
    <div class="tags">
        <div class="tag" onclick="quick('Миранда')">⚖️ Миранда</div>
        <div class="tag" onclick="quick('Статья 13.2 УК')">💊 Наркотики</div>
        <div class="tag" onclick="quick('17.6 УК')">🛑 Неподчинение</div>
        <div class="tag" onclick="quick('Обыск')">🔍 Обыск</div>
    </div>
    <div class="input-group">
        <button class="btn" id="mic"><i class="fas fa-microphone"></i></button>
        <input type="text" id="userInput" placeholder="Ваш запрос..." autocomplete="off">
        <button class="btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    const KEY = 'AIzaSyBSeOzHcdG9WKNxOqCK5wcShECKlli1Aec';
    // Используем максимально надежный URL
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;

    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');
    const typing = document.getElementById('typing');
    const debug = document.getElementById('debugLog');

    function logError(msg) {
        debug.style.display = 'block';
        debug.innerText = "ОШИБКА: " + msg;
    }

    async function sendMsg() {
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, 'user');
        input.value = '';
        typing.style.display = 'block';
        debug.style.display = 'none';
        chat.scrollTop = chat.scrollHeight;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Ты - ассистент LSPD на Majestic RP Phoenix. Отвечай кратко по делу. Запрос: ${text}` }] }]
                })
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error ? errData.error.message : response.statusText);
            }

            const data = await response.json();
            typing.style.display = 'none';

            if (data.candidates && data.candidates[0].content) {
                addMsg(data.candidates[0].content.parts[0].text, 'bot');
            } else {
                logError("Получен пустой ответ от API.");
            }
        } catch (e) {
            typing.style.display = 'none';
            logError(e.message);
            addMsg("Сбой связи. Проверьте лог внизу.", 'bot');
        }
    }

    function addMsg(t, type) {
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerHTML = t.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    function quick(v) { input.value = v; sendMsg(); }
    input.onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };

    // Голосовой ввод (может не работать в простых мобильных "открывашках" файлов)
    const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (Rec) {
        const r = new Rec(); r.lang = 'ru-RU';
        document.getElementById('mic').onclick = () => { try { r.start(); document.getElementById('mic').classList.add('mic-active'); } catch(e) { logError("Голос недоступен"); } };
        r.onresult = (e) => { input.value = e.results[0][0].transcript; sendMsg(); };
        r.onend = () => document.getElementById('mic').classList.remove('mic-active');
    }
</script>
</body>
</html>
