<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BE PHOENIX LSPD | Assistant</title>
    <style>
        :root { --main-blue: #1e3a8a; --bg-dark: #0f172a; --text-light: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-dark); color: var(--text-light); margin: 0; display: flex; justify-content: center; height: 100vh; }
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; background: #1e293b; border-left: 2px solid var(--main-blue); border-right: 2px solid var(--main-blue); }
        header { background: var(--main-blue); padding: 15px; text-align: center; font-weight: bold; letter-spacing: 1px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #chat { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 10px 15px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .user { align-self: flex-end; background: #334155; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: #1e40af; border-bottom-left-radius: 2px; white-space: pre-wrap; }
        .controls { padding: 15px; background: #0f172a; display: flex; gap: 10px; }
        input { flex: 1; background: #1e293b; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; outline: none; }
        button { background: var(--main-blue); border: none; color: white; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div id="app">
    <header>BE PHOENIX LSPD v1.0</header>
    <div id="chat">
        <div class="msg bot">Офицер, база данных загружена. Жду запрос по статьям или порядку задержания.</div>
    </div>
    <div class="controls">
        <input type="text" id="userInput" placeholder="Статья, Миранда, Порядок..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">SEND</button>
    </div>
</div>

<script>
    // ВСТАВЬ СВОЙ КЛЮЧ ТУТ
    const API_KEY = 'AIzaSyBSeOzHcdG9WKNxOqCK5wcShECKlli1Aec'; 
    const chat = document.getElementById('chat');

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        input.value = '';

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Ты - ИИ помощник LSPD на Majestic RP Phoenix. Твоя база: УК, ПК и законы штата. Отвечай кратко, по делу, структурировано. Пользователь спрашивает: ${text}` }] }]
                })
            });

            const data = await response.json();
            const reply = data.candidates[0].content.parts[0].text;
            addMessage(reply, 'bot');
        } catch (e) {
            addMessage("Ошибка связи с базой. Проверь API ключ.", 'bot');
        }
    }

    function addMessage(text, side) {
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        div.innerText = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
