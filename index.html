<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOENIX LSPD TERMINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --blue: #58a6ff; --text: #c9d1d9; --green: #3fb950; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; }
        
        header { padding: 15px; background: var(--panel); border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .title { color: var(--blue); font-weight: bold; font-size: 14px; text-transform: uppercase; }

        #chat { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .user { align-self: flex-end; background: #238636; color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: #21262d; border: 1px solid #30363d; border-bottom-left-radius: 2px; }

        #typing { display: none; padding: 5px 15px; font-size: 12px; color: #8b949e; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }

        #errorBox { display: none; background: #f8514922; color: #f85149; padding: 10px; font-size: 11px; border: 1px solid #f85149; margin: 10px; border-radius: 5px; }

        .footer { padding: 15px; background: var(--panel); border-top: 1px solid #30363d; }
        .input-wrap { display: flex; gap: 8px; background: #0d1117; border-radius: 25px; padding: 5px 15px; border: 1px solid #30363d; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 16px; }
        
        .btn { background: none; border: none; color: var(--blue); font-size: 18px; cursor: pointer; }
        .tags { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .tag { background: #21262d; padding: 6px 12px; border-radius: 15px; font-size: 11px; white-space: nowrap; border: 1px solid #30363d; }
    </style>
</head>
<body>

<header>
    <div class="title"><i class="fas fa-shield-halved"></i> PHOENIX LSPD v4.0</div>
    <div style="font-size: 10px; color: var(--green);">● СВЯЗЬ АКТИВНА</div>
</header>

<div id="chat">
    <div class="msg bot">Офицер, терминал обновлен до версии 4.0. Протокол <b>v1 Stable</b> запущен. Жду запрос.</div>
</div>

<div id="typing"><i class="fas fa-sync fa-spin"></i> Обработка запроса ИИ...</div>
<div id="errorBox"></div>

<div class="footer">
    <div class="tags">
        <div class="tag" onclick="q('Миранда')">⚖️ Миранда</div>
        <div class="tag" onclick="q('Наркотики 13.1 УК')">💊 Наркотики</div>
        <div class="tag" onclick="q('Задержание 17.6 УК')">🛑 Неподчинение</div>
        <div class="tag" onclick="q('Этапы задержания')">🚔 Процесс</div>
    </div>
    <div class="input-wrap">
        <button class="btn" id="mic"><i class="fas fa-microphone"></i></button>
        <input type="text" id="userInput" placeholder="Введите текст..." autocomplete="off">
        <button class="btn" onclick="send()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    const KEY = 'AIzaSyBSeOzHcdG9WKNxOqCK5wcShECKlli1Aec';
    // ИСПОЛЬЗУЕМ СТАБИЛЬНУЮ V1 И ПОЛНЫЙ ПУТЬ К МОДЕЛИ
    const URL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${KEY}`;

    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');
    const typing = document.getElementById('typing');
    const err = document.getElementById('errorBox');

    async function send() {
        const val = input.value.trim();
        if(!val) return;

        addMsg(val, 'user');
        input.value = '';
        typing.style.display = 'block';
        err.style.display = 'none';
        chat.scrollTop = chat.scrollHeight;

        try {
            const response = await fetch(URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Ты - ассистент офицера LSPD на Majestic Phoenix. Отвечай кратко, используй УК и ПК. Запрос: ${val}` }] }]
                })
            });

            const data = await response.json();
            typing.style.display = 'none';

            if (data.candidates && data.candidates[0].content) {
                addMsg(data.candidates[0].content.parts[0].text, 'bot');
            } else {
                err.innerText = "ОШИБКА API: " + (data.error ? data.error.message : "Неизвестный сбой");
                err.style.display = 'block';
            }
        } catch (e) {
            typing.style.display = 'none';
            err.innerText = "СЕТЕВАЯ ОШИБКА: " + e.message;
            err.style.display = 'block';
        }
    }

    function addMsg(t, s) {
        const d = document.createElement('div');
        d.className = `msg ${s}`;
        d.innerHTML = t.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    function q(v) { input.value = v; send(); }
    input.onkeypress = (e) => e.key === 'Enter' && send();

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
        const r = new SR(); r.lang = 'ru-RU';
        document.getElementById('mic').onclick = () => { r.start(); };
        r.onresult = (e) => { input.value = e.results[0][0].transcript; send(); };
    }
</script>
</body>
</html>
